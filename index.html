function parseMoney(value) {
  const parsed = Number.parseFloat(String(value ?? '0').replace(',', '.'));
  return Number.isFinite(parsed) ? parsed : 0;
}

function getSortedArticles(articles) {
  return [...articles].sort((left, right) => {
    const diff = Math.abs(parseMoney(right.latestpricediff)) - Math.abs(parseMoney(left.latestpricediff));
    if (diff !== 0) return diff;
    return String(left.articleid).localeCompare(String(right.articleid), 'sv');
  });
}

function filterArticles(articles, query) {
  const normalized = query.trim().toLocaleLowerCase('sv');
  if (!normalized) return articles;

  return articles.filter(article => {
    return String(article.articleid).toLocaleLowerCase('sv').includes(normalized)
      || String(article.name).toLocaleLowerCase('sv').includes(normalized);
  });
}

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function diffClass(value) {
  const parsed = parseMoney(value);
  if (parsed > 0) return 'diff-positive';
  if (parsed < 0) return 'diff-negative';
  return 'diff-neutral';
}

function latestHistory(article) {
  const history = Array.isArray(article.pricehistory) ? article.pricehistory : [];
  return history.length > 0 ? history[history.length - 1] : null;
}

function articleImageSrc(articleId) {
  return `https://placecats.com/300/200?article=${encodeURIComponent(String(articleId ?? ''))}`;
}

function renderArticleRows(articles, append = false) {
  const rows = articles.map(article => {
    const latest = latestHistory(article);
    const replacedBy = article.replacedby
      ? `<span class="replaced-by">Replaced by ${escapeHtml(article.replacedby)}</span>`
      : '';

    return `
      <tr data-article-id="${escapeHtml(article.articleid)}">
        <td class="article-cell">
          <img class="article-thumb" src="${escapeHtml(articleImageSrc(article.articleid))}" alt="" loading="lazy">
          <span class="article-id">${escapeHtml(article.articleid)}</span>
        </td>
        <td class="name-cell">${escapeHtml(article.name)}${replacedBy}</td>
        <td class="money ${diffClass(article.latestpricediff)}">${escapeHtml(article.latestpricediff)}</td>
        <td class="money">${escapeHtml(latest ? latest.price : '')}</td>
        <td>${Array.isArray(article.pricehistory) ? article.pricehistory.length : 0}</td>
      </tr>
    `;
  }).join('');

  if (append) {
    articleList.insertAdjacentHTML('beforeend', rows);
  } else {
    articleList.innerHTML = rows;
  }

  articleList.querySelectorAll('tr:not([data-bound])').forEach(row => {
    row.dataset.bound = 'true';
    row.addEventListener('click', () => {
      const article = sortedArticles.find(item => String(item.articleid) === row.dataset.articleId);
      if (article) showDetail(article);
    });
  });

  emptyState.hidden = activeArticles.length !== 0;
}

function renderHistoryRows(article) {
  const history = Array.isArray(article.pricehistory) ? article.pricehistory : [];
  return history.map(entry => `
    <div class="history-row">
      <span>${escapeHtml(entry.date)}</span>
      <span class="money">${escapeHtml(entry.price)}</span>
      <span class="money ${diffClass(entry.priceDiff)}">${escapeHtml(entry.priceDiff)}</span>
    </div>
  `).join('');
}

function showDetail(article) {
  const latest = latestHistory(article);
  articleDetail.innerHTML = `
    <div class="detail-header">
      <div class="detail-title">
        <img class="detail-image" src="${escapeHtml(articleImageSrc(article.articleid))}" alt="" loading="lazy">
        <div>
          <div class="article-id">${escapeHtml(article.articleid)}</div>
          <h2>${escapeHtml(article.name)}</h2>
          <div class="detail-meta">${article.replacedby ? `Replaced by ${escapeHtml(article.replacedby)}` : 'Not replaced'}</div>
        </div>
      </div>
      <div>
        <div class="money ${diffClass(article.latestpricediff)}">Latest diff ${escapeHtml(article.latestpricediff)}</div>
        <div class="money">Latest price ${escapeHtml(latest ? latest.price : '')}</div>
      </div>
    </div>
    <div class="history">${renderHistoryRows(article)}</div>
  `;

  listView.hidden = true;
  detailView.hidden = false;
}

function showList() {
  detailView.hidden = true;
  listView.hidden = false;
}

function renderVisibleArticles(append = false) {
  const nextArticles = activeArticles.slice(append ? visibleArticleCount : 0, visibleArticleCount);
  renderArticleRows(nextArticles, append);
}

function resetList() {
  activeArticles = filterArticles(sortedArticles, searchInput.value);
  visibleArticleCount = Math.min(pageSize, activeArticles.length);
  renderVisibleArticles(false);
}

function loadMoreArticles() {
  if (visibleArticleCount >= activeArticles.length) {
    return;
  }

  const previousCount = visibleArticleCount;
  visibleArticleCount = Math.min(visibleArticleCount + pageSize, activeArticles.length);
  renderArticleRows(activeArticles.slice(previousCount, visibleArticleCount), true);
}

function maybeLoadMoreArticles() {
  if (detailView.hidden === false || activeArticles.length === 0) {
    return;
  }

  const remainingScroll = document.documentElement.scrollHeight - window.innerHeight - window.scrollY;
  if (remainingScroll < 420) {
    loadMoreArticles();
  }
}

function updateListDebounced() {
  clearTimeout(searchDebounceTimer);
  searchDebounceTimer = setTimeout(resetList, 300);
}

const articlesCacheTimestampKey = 'articlescachekey';
const articlesCacheDataKey = 'articles';

function readCachedResult(timestamp) {
  try {
    const cachedTimestamp = localStorage.getItem(articlesCacheTimestampKey);
    if (!cachedTimestamp || cachedTimestamp < timestamp) {
      return null;
    }

    const cached = localStorage.getItem(articlesCacheDataKey);
    if (!cached) {
      return null;
    }

    const resultData = JSON.parse(cached);
    return resultData && resultData.timestamp === cachedTimestamp ? resultData : null;
  } catch {
    return null;
  }
}

function writeCachedResult(resultData) {
  try {
    localStorage.setItem(articlesCacheTimestampKey, resultData.timestamp);
    localStorage.setItem(articlesCacheDataKey, JSON.stringify(resultData));
  } catch {
    // Rendering should still work if localStorage is blocked or full.
  }
}

function base64ToBytes(value) {
  const binary = atob(value);
  const bytes = new Uint8Array(binary.length);
  for (let index = 0; index < binary.length; index++) {
    bytes[index] = binary.charCodeAt(index);
  }

  return bytes;
}

async function decompressResultData(data) {
  if (data.encoding !== 'gzip-base64') {
    throw new Error(`Unsupported result data encoding: ${data.encoding}`);
  }

  const stream = new Blob([base64ToBytes(data.payload)])
    .stream()
    .pipeThrough(new DecompressionStream('gzip'));
  return JSON.parse(await new Response(stream).text());
}

async function loadResultData(timestamp, data) {
  const cached = readCachedResult(timestamp);
  if (cached) {
    return cached;
  }

  const resultData = await decompressResultData(data);
  if (resultData.timestamp !== timestamp) {
    throw new Error('Compressed result data timestamp does not match page timestamp.');
  }

  writeCachedResult(resultData);
  return resultData;
}

function renderApp(resultData) {
  sortedArticles = getSortedArticles(Array.isArray(resultData.articles) ? resultData.articles : []);
  summary.textContent = `${sortedArticles.length} articles. Result timestamp ${resultData.timestamp}. Sorted by absolute latest price diff.`;
  resetList();
}

searchInput.addEventListener('input', updateListDebounced);
window.addEventListener('scroll', maybeLoadMoreArticles, { passive: true });
backButton.addEventListener('click', showList);
window.addEventListener('keydown', event => {
  if (event.key === 'Escape' && !detailView.hidden) {
    showList();
  }
});

const appReady = loadResultData(resultDataTimestamp, compressedResultData)
  .then(renderApp)
  .catch(error => {
    console.error(error);
    summary.textContent = 'Could not load price data.';
  });

  </script>
</body>
